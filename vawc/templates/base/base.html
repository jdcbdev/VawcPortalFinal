{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" href="{% static 'img/ecs-no-bg-2.png' %}" type="image/icon type">
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
    <link rel="stylesheet" href="{% static '/css/multi-form.css' %}">
    <link rel="stylesheet" href="{% static '/css/bootstrap.min.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    {% block styles %}{% endblock %}
    <style>
        .bg-purple-custom { background-color: #6717b2 !important; color: white !important; }
        .bg-purple-light-custom { background-color: #8a2be2 !important; color: white !important; }
        .bg-danger-custom { background-color: #dc3545 !important; color: white !important; }
    </style>
  </head>
  <body>
    {% include 'include/normal/navbar.html' %}
    <main>
      {% block content %}{% endblock %}
    </main>
    {% include 'include/normal/footer.html' %}
    <script src="{% static 'js/jquery-3.6.4.min.js' %}"></script>
    <script src="{% static 'js/login.js' %}"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
        function showToast(type, message) {
            const toastId = type === 'success' ? '#successToast' : '#errorToast';
            const $toast = $(toastId);
            $toast.find('.toast-body').text(message);
            const toast = new bootstrap.Toast($toast[0], { delay: 4000 });
            toast.show();
        }

        $(document).on('show.bs.toast', '.toast', function () {
            const $toast = $(this);
            const theme = $('body').attr('data-toast-theme') || 'purple';
            const $header = $toast.find('.toast-header');
            const $body = $toast.find('.toast-body');
            const $closeBtn = $toast.find('.btn-close');
            const isSuccess = $toast.attr('id') === 'successToast' || $toast.hasClass('bg-success') || $toast.hasClass('toast-success');
            
            $header.removeClass('bg-primary bg-gold bg-danger bg-purple-custom bg-purple-light-custom bg-danger-custom text-white text-dark');
            $body.removeClass('bg-primary bg-gold bg-danger bg-purple-custom bg-purple-light-custom bg-danger-custom text-white text-dark');
            $header.css('background-color', '');
            $body.css('background-color', '');
            
                        if (isSuccess) {
                const bgClass = (theme === 'gold') ? 'bg-purple-light-custom' : 'bg-purple-custom';
                $header.addClass(bgClass).addClass('text-white');
                $body.addClass('text-dark');
            } else {
                $header.addClass('bg-danger-custom').addClass('text-white');
                $body.addClass('text-dark');
            }
            
            
            $closeBtn.addClass('btn-close-white');
        });
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
